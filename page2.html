<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SDGs 纯图标点击 - 大圖標版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #77BEEE;
            color: #0a2540;
            padding: 2rem 1.5rem 3rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1400px; /* 稍微加大容器寬度以容納大圖標 */
            width: 100%;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-size: 2.8rem; /* 標題也稍微加強 */
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #2b5f8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .hero p {
            font-size: 1.1rem;
            color: #2c5575;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        /* --- 修改重點：加大網格尺寸 --- */
        .sdg-grid {
            display: grid;
            /* 調整 minmax，讓每個單元格至少 160px 寬 */
            grid-template-columns: repeat(auto-fill, minmax(160px, 180px));
            justify-content: center;
            gap: 2.5rem 2rem; /* 加大間距，避免大圖顯得擁擠 */
            margin: 3rem 0;
        }

        .sdg-icon {
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .sdg-icon:hover {
            transform: translateY(-10px) scale(1.05); /* 懸浮效果也加大一點 */
        }

        /* --- 修改重點：加大圖片尺寸 --- */
        .sdg-icon img {
            width: 160px; /* 原為 100px */
            height: auto;
            display: block;
            margin: 0 auto;
            object-fit: contain;
            /* 加上陰影讓圖標更有質感 */
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .icon-label {
            margin-top: 0.8rem;
            font-size: 0.85rem; /* 字體稍微加大 */
            font-weight: 600;
            color: #2c5575;
            background: transparent;
            display: inline-block;
        }

        /* 悬浮视窗样式 (保持原樣，僅微調 z-index) */
        .sdg-popup {
            position: fixed;
            z-index: 2000;
            background: #ffffff;
            border-radius: 28px;
            padding: 0;
            max-width: 320px;
            width: max-content;
            min-width: 240px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s;
            pointer-events: auto;
        }
        .sdg-popup.active {
            opacity: 1;
            visibility: visible;
        }
        .popup-inner {
            padding: 1.5rem;
            position: relative;
        }
        .popup-header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #e9f0f5;
            padding-bottom: 0.8rem;
            margin-bottom: 1rem;
        }
        .popup-icon {
            background: #eef2ff;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .popup-icon img {
            width: 38px;
            height: auto;
        }
        .popup-title {
            font-weight: 800;
            font-size: 1.3rem;
            color: #0a2f44;
        }
        .popup-sub {
            font-size: 0.8rem;
            font-weight: 500;
            color: #4f7ea0;
        }
        .popup-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #1f3e54;
        }
        .close-popup {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #f0f4f9;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: #3a6d8c;
        }

        .info-tip {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #1e3c72;
            background: rgba(255, 255, 255, 0.5);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }

        /* --- 響應式調整：加大手機版的圖標 --- */
        @media (max-width: 700px) {
            .sdg-grid {
                gap: 1.2rem;
                grid-template-columns: repeat(auto-fill, minmax(100px, 110px));
            }
            .sdg-icon img {
                width: 100px; /* 手機版從 60px 變大為 100px */
            }
            .hero h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>SDGs</h1>
        <p>SUSTAINABLE DEVELOPMENT GOALS</p>
    </div>

    <div class="sdg-grid" id="sdgGrid"></div>

    <div class="info-tip">
        ✨ Tap any icon to see details
    </div>
</div>

<div id="sdgPopup" class="sdg-popup">
    <div class="popup-inner">
        <button class="close-popup" id="closePopupBtn">✕</button>
        <div class="popup-header">
            <div class="popup-icon" id="popupIcon">
                <img src="" alt="" id="popupImg">
            </div>
            <div>
                <div class="popup-title" id="popupTitle"></div>
                <div class="popup-sub" id="popupSub"></div>
            </div>
        </div>
        <div class="popup-desc" id="popupDesc"></div>
    </div>
</div>

<script>
    // 數據部分保持不變
    const sdgData = [
        { id: 1, title: "No Poverty", shortDesc: "消除各地一切形式的贫穷", description: "在全世界消除一切形式的贫困。确保穷人和弱势群体享有平等经济资源、基本服务、土地所有权、技术等权利。", iconFile: "IMAGE/goal1.png" },
        { id: 2, title: "Zero Hunger", shortDesc: "消除饥饿，实现粮食安全", description: "消除饥饿，实现粮食安全，改善营养状况和促进可持续农业。保障所有人全年都有安全、营养且充足的食物。", iconFile: "IMAGE/goal2.png" },
        { id: 3, title: "Good Health and Well-Being", shortDesc: "确保健康的生活方式", description: "确保健康的生活方式，促进各年龄段人群的福祉。降低母婴死亡率，终结流行病，普及基本医疗。", iconFile: "IMAGE/goal3.png" },
        { id: 4, title: "Quality Education", shortDesc: "包容公平的优质教育", description: "确保包容和公平的优质教育，让全民终身享有学习机会。实现所有男女童完成免费中小学教育。", iconFile: "IMAGE/goal4.png" },
        { id: 5, title: "Gender Equality", shortDesc: "实现性别平等，赋能妇女", description: "实现性别平等，增强所有妇女和女童的权能。消除一切形式的歧视与暴力。", iconFile: "IMAGE/goal5.png" },
        { id: 6, title: "Clean Water and Sanitation", shortDesc: "人人享有水和环境卫生", description: "为所有人提供水和环境卫生并对其进行可持续管理。实现安全饮用水普遍获取。", iconFile: "IMAGE/goal6.png" },
        { id: 7, title: "Affordable and Clean Energy", shortDesc: "可负担的现代能源", description: "确保人人获得负担得起、可靠和可持续的现代能源。大幅增加可再生能源比例。", iconFile: "IMAGE/goal7.png" },
        { id: 8, title: "Decent Work and Economic Growth", shortDesc: "促进持久经济增长", description: "促进持久、包容和可持续经济增长，实现充分和生产性就业，確保體面工作。", iconFile: "IMAGE/goal8.png" },
        { id: 9, title: "Industry, Innovation and Infrastructure", shortDesc: "可持续基建与工业化", description: "建造具备抵御灾害能力的基础设施，促进包容可持续工业化，推动创新。", iconFile: "IMAGE/goal9.png" },
        { id: 10, title: "Reduced Inequalities", shortDesc: "减少国家内部及外部不平等", description: "减少国家内部和国家之间的不平等。提升社会、经济和政治包容性。", iconFile: "IMAGE/goal10.png" },
        { id: 11, title: "Sustainable Cities and Communities", shortDesc: "包容、安全、韧性的城市", description: "建设包容、安全、有抵御灾害能力和可持续的城市。改善贫民窟居住条件。", iconFile: "IMAGE/goal11.png" },
        { id: 12, title: "Responsible Consumption and Production", shortDesc: "可持续消费及生产模式", description: "确保可持续消费和生产模式。高效利用资源，减少粮食浪费。", iconFile: "IMAGE/goal12.png" },
        { id: 13, title: "Climate Action", shortDesc: "应对气候变化及其影响", description: "采取紧急行动应对气候变化及其影响。加强抵御气候灾害能力，納入國家政策。", iconFile: "IMAGE/goal13.png" },
        { id: 14, title: "Life Below Water", shortDesc: "保护海洋和海洋资源", description: "保护和可持续利用海洋及海洋资源以促进可持续发展。减少海洋污染。", iconFile: "IMAGE/goal14.png" },
        { id: 15, title: "Life on Land", shortDesc: "保护陆地生态系统", description: "保护、恢复和促进可持续利用陆地生态系统，防治荒漠化，遏制生物多样性丧失。", iconFile: "IMAGE/goal15.png" },
        { id: 16, title: "Peace, Justice and Strong Institutions", shortDesc: "创建和平包容的社会", description: "创建和平、包容的社会以促进可持续发展，让所有人都能诉诸司法。", iconFile: "IMAGE/goal16.png" },
        { id: 17, title: "Partnerships for the Goals", shortDesc: "加强全球可持续发展伙伴关系", description: "加强执行手段，重振可持续发展全球伙伴关系。动员资源，促进技术转让。", iconFile: "IMAGE/goal17.png" }
    ];

    const gridContainer = document.getElementById('sdgGrid');
    const popup = document.getElementById('sdgPopup');
    const popupImg = document.getElementById('popupImg');
    const popupTitleElem = document.getElementById('popupTitle');
    const popupSubElem = document.getElementById('popupSub');
    const popupDescElem = document.getElementById('popupDesc');
    const closeBtn = document.getElementById('closePopupBtn');

    function updatePopupContent(goal) {
        popupImg.src = goal.iconFile;
        popupImg.alt = goal.title;
        popupTitleElem.innerText = `Goal ${goal.id}`;
        popupSubElem.innerText = goal.title;
        popupDescElem.innerText = goal.description;
    }

    function showPopupNearElement(element, goalData) {
        updatePopupContent(goalData);
        const rect = element.getBoundingClientRect();
        
        // 計算彈出位置
        let leftPos = rect.right + 20;
        let topPos = rect.top + (rect.height / 2) - (popup.offsetHeight / 2);

        // 邊界檢查
        if (leftPos + 320 > window.innerWidth) {
            leftPos = rect.left - 340;
        }
        if (leftPos < 10) leftPos = (window.innerWidth - popup.offsetWidth) / 2;
        if (topPos < 10) topPos = 10;
        
        popup.style.left = leftPos + 'px';
        popup.style.top = topPos + 'px';
        popup.classList.add('active');
    }

    function buildIconGrid() {
        gridContainer.innerHTML = '';
        sdgData.forEach(goal => {
            const iconWrapper = document.createElement('div');
            iconWrapper.className = 'sdg-icon';
            
            const img = document.createElement('img');
            img.src = goal.iconFile;
            img.alt = goal.title;

            const labelSpan = document.createElement('div');
            labelSpan.className = 'icon-label';
            labelSpan.innerText = `Goal ${goal.id}`;
            
            iconWrapper.appendChild(img);
            iconWrapper.appendChild(labelSpan);

            iconWrapper.addEventListener('click', (e) => {
                e.stopPropagation();
                showPopupNearElement(iconWrapper, goal);
            });

            gridContainer.appendChild(iconWrapper);
        });
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.sdg-popup') && !e.target.closest('.sdg-icon')) {
            popup.classList.remove('active');
        }
    });

    closeBtn.addEventListener('click', () => popup.classList.remove('active'));
    window.addEventListener('resize', () => popup.classList.remove('active'));

    buildIconGrid();
</script>
</body>
</html>
