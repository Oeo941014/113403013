<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>可持续发展目标 · SDGs 纯图标点击展示</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #77BEEE;
            color: #0a2540;
            padding: 2rem 1.5rem 3rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }
        .hero h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3c72, #2b5f8a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .hero p {
            font-size: 1rem;
            color: #2c5575;
            margin-top: 0.5rem;
        }

        /* 图标网格 — 只有图片，没有任何边框/圆圈 */
        .sdg-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 120px));
            justify-content: center;
            gap: 2rem 1.8rem;
            margin: 2rem 0;
        }

        /* 可点击的图片容器 */
        .sdg-icon {
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s ease;
        }
        .sdg-icon:hover {
            transform: translateY(-6px);
        }

        /* 图片本身样式 — 无边框无背景 */
        .sdg-icon img {
            width: 100px;
            height: auto;
            display: block;
            margin: 0 auto;
            object-fit: contain;
        }

        /* 可选：在图片下方显示极简编号（不要的话可以删除下一块） */
        .icon-label {
            margin-top: 0.6rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #6b8eaa;
            background: transparent;
            display: inline-block;
            padding: 0;
        }

        /* 悬浮视窗样式 (完全保留) */
        .sdg-popup {
            position: fixed;
            z-index: 1000;
            background: #ffffff;
            border-radius: 28px;
            padding: 0;
            max-width: 320px;
            width: max-content;
            min-width: 240px;
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(77, 151, 193, 0.2);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s;
            pointer-events: auto;
        }
        .sdg-popup.active {
            opacity: 1;
            visibility: visible;
        }
        .popup-inner {
            padding: 1.2rem 1.2rem 1rem 1.2rem;
            position: relative;
        }
        .popup-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #e9f0f5;
            padding-bottom: 0.75rem;
            margin-bottom: 0.8rem;
        }
        .popup-icon {
            background: #eef2ff;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .popup-icon img {
            width: 32px;
            height: auto;
            display: block;
        }
        .popup-title {
            font-weight: 800;
            font-size: 1.2rem;
            line-height: 1.2;
            color: #0a2f44;
        }
        .popup-sub {
            font-size: 0.7rem;
            font-weight: 500;
            color: #4f7ea0;
            margin-top: 2px;
        }
        .popup-desc {
            font-size: 0.9rem;
            line-height: 1.45;
            color: #1f3e54;
            margin: 0.75rem 0 0.5rem;
        }
        .close-popup {
            position: absolute;
            top: 12px;
            right: 14px;
            background: #f0f4f9;
            border-radius: 30px;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            cursor: pointer;
            color: #3a6d8c;
            transition: 0.1s;
            border: none;
        }
        .close-popup:hover {
            background: #e2eaf1;
            color: #1c4f6e;
        }
        .info-tip {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #5584a8;
            background: #eef3fa;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
        }
        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: #5e7f9a;
        }

        @media (max-width: 700px) {
            body {
                padding: 1.2rem;
            }
            .sdg-grid {
                gap: 1.5rem;
                grid-template-columns: repeat(auto-fill, minmax(75px, 85px));
            }
            .sdg-icon img {
                width: 60px;
            }
            .icon-label {
                font-size: 0.6rem;
            }
            .sdg-popup {
                max-width: 260px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>🌱 可持续发展目标 · SDGs</h1>
        <p>点击任意图标 — 查看详细说明</p>
    </div>

    <!-- 纯图标网格 -->
    <div class="sdg-grid" id="sdgGrid"></div>

    <div class="info-tip">
        ✨ 轻触任何一个图标 → 弹出详细介绍
    </div>
    <footer>
        🌍 消除贫困 · 保护地球 · 确保繁荣 | 17个全球目标
    </footer>
</div>

<!-- 悬浮视窗 -->
<div id="sdgPopup" class="sdg-popup">
    <div class="popup-inner">
        <button class="close-popup" id="closePopupBtn">✕</button>
        <div class="popup-header">
            <div class="popup-icon" id="popupIcon">
                <img src="IMAGE/goal1.png" alt="目标图标" id="popupImg">
            </div>
            <div>
                <div class="popup-title" id="popupTitle">目标 1</div>
                <div class="popup-sub" id="popupSub">无贫穷</div>
            </div>
        </div>
        <div class="popup-desc" id="popupDesc">
            在全世界消除一切形式的贫困。
        </div>
    </div>
</div>

<script>
    // SDGs 数据 (包含图片路径及详细说明)
    const sdgData = [
        { id: 1, title: "无贫穷", shortDesc: "消除各地一切形式的贫穷", description: "在全世界消除一切形式的贫困。确保穷人和弱势群体享有平等经济资源、基本服务、土地所有权、技术等权利，增强抵御灾害的能力。", iconFile: "IMAGE/goal1.png" },
        { id: 2, title: "零饥饿", shortDesc: "消除饥饿，实现粮食安全", description: "消除饥饿，实现粮食安全，改善营养状况和促进可持续农业。保障所有人全年都有安全、营养且充足的食物。", iconFile: "IMAGE/goal2.png" },
        { id: 3, title: "良好健康与福祉", shortDesc: "确保健康的生活方式", description: "确保健康的生活方式，促进各年龄段人群的福祉。降低母婴死亡率，终结艾滋病、结核病等流行病，并普及基本医疗服务。", iconFile: "IMAGE/goal3.png" },
        { id: 4, title: "优质教育", shortDesc: "包容公平的优质教育", description: "确保包容和公平的优质教育，让全民终身享有学习机会。实现所有男女童完成免费中小学教育，大幅提高拥有相关就业技能的人数。", iconFile: "IMAGE/goal4.png" },
        { id: 5, title: "性别平等", shortDesc: "实现性别平等，赋能妇女", description: "实现性别平等，增强所有妇女和女童的权能。消除一切形式的歧视与暴力，确保女性平等参与领导与决策。", iconFile: "IMAGE/goal5.png" },
        { id: 6, title: "清洁饮水和卫生设施", shortDesc: "人人享有水和环境卫生", description: "为所有人提供水和环境卫生并对其进行可持续管理。实现安全饮用水普遍获取，减少水污染，改善水质及用水效率。", iconFile: "IMAGE/goal6.png" },
        { id: 7, title: "经济适用的清洁能源", shortDesc: "可负担的现代能源", description: "确保人人获得负担得起、可靠和可持续的现代能源。大幅增加可再生能源比例，提升能源效率，加强清洁能源技术合作。", iconFile: "IMAGE/goal7.png" },
        { id: 8, title: "体面工作和经济增长", shortDesc: "促进持久经济增长", description: "促进持久、包容和可持续经济增长，实现充分和生产性就业，确保人人获得体面工作。支持创业、消除强迫劳动。", iconFile: "IMAGE/goal8.png" },
        { id: 9, title: "产业、创新和基础设施", shortDesc: "可持续基建与工业化", description: "建造具备抵御灾害能力的基础设施，促进包容可持续工业化，推动创新。升级技术，支持中小型企业获得金融资源。", iconFile: "IMAGE/goal9.png" },
        { id: 10, title: "减少不平等", shortDesc: "减少国家内部及外部不平等", description: "减少国家内部和国家之间的不平等。提升社会、经济和政治包容性，确保机会均等，促进有序、安全移民。", iconFile: "IMAGE/goal10.png" },
        { id: 11, title: "可持续城市和社区", shortDesc: "包容、安全、韧性的城市", description: "建设包容、安全、有抵御灾害能力和可持续的城市。改善贫民窟居住条件，提供绿色公共空间与可持续交通。", iconFile: "IMAGE/goal11.png" },
        { id: 12, title: "负责任消费和生产", shortDesc: "可持续消费及生产模式", description: "确保可持续消费和生产模式。高效利用资源，减少粮食浪费，对化学品和废物实施环保管理，推广生命周期思维。", iconFile: "IMAGE/goal12.png" },
        { id: 13, title: "气候行动", shortDesc: "应对气候变化及其影响", description: "采取紧急行动应对气候变化及其影响。加强抵御气候灾害能力，将应对措施纳入国家政策，提升气候变化教育。", iconFile: "IMAGE/goal13.png" },
        { id: 14, title: "水下生物", shortDesc: "保护海洋和海洋资源", description: "保护和可持续利用海洋及海洋资源以促进可持续发展。减少海洋污染，保护沿海生态系统，打击非法捕捞。", iconFile: "IMAGE/goal14.png" },
        { id: 15, title: "陆地生物", shortDesc: "保护陆地生态系统", description: "保护、恢复和促进可持续利用陆地生态系统，可持续管理森林，防治荒漠化，遏制生物多样性丧失，停止偷猎。", iconFile: "IMAGE/goal15.png" },
        { id: 16, title: "和平、正义与强大机构", shortDesc: "创建和平包容的社会", description: "创建和平、包容的社会以促进可持续发展，让所有人都能诉诸司法，在各级建立有效、负责和包容的机构。减少暴力及腐败。", iconFile: "IMAGE/goal16.png" },
        { id: 17, title: "促进目标实现的伙伴关系", shortDesc: "加强全球可持续发展伙伴关系", description: "加强执行手段，重振可持续发展全球伙伴关系。动员资源，促进技术转让、能力建设，建立多利益攸关方伙伴关系。", iconFile: "IMAGE/goal17.png" }
    ];

    // DOM 元素
    const gridContainer = document.getElementById('sdgGrid');
    const popup = document.getElementById('sdgPopup');
    const popupImg = document.getElementById('popupImg');
    const popupTitleElem = document.getElementById('popupTitle');
    const popupSubElem = document.getElementById('popupSub');
    const popupDescElem = document.getElementById('popupDesc');
    const closeBtn = document.getElementById('closePopupBtn');

    let activeIcon = null;

    function updatePopupContent(goal) {
        popupImg.src = goal.iconFile;
        popupImg.alt = goal.title;
        popupTitleElem.innerText = `目标 ${goal.id}`;
        popupSubElem.innerText = goal.title;
        popupDescElem.innerText = goal.description;
    }

    function showPopupNearElement(element, goalData) {
        if (!element || !popup) return;
        updatePopupContent(goalData);

        const rect = element.getBoundingClientRect();
        const popupWidth = popup.offsetWidth;
        const popupHeight = popup.offsetHeight;
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;

        let leftPos = rect.right + 14;
        let topPos = rect.top + (rect.height / 2) - (popupHeight / 2);

        if (leftPos + popupWidth > viewportWidth - 12) {
            leftPos = rect.left - popupWidth - 14;
        }
        if (leftPos < 10) leftPos = 12;
        if (topPos < 10) topPos = 12;
        if (topPos + popupHeight > viewportHeight - 10) {
            topPos = viewportHeight - popupHeight - 12;
        }

        popup.style.left = leftPos + 'px';
        popup.style.top = topPos + 'px';
        popup.classList.add('active');
        activeIcon = element;
    }

    function hidePopup() {
        if (popup) {
            popup.classList.remove('active');
            activeIcon = null;
        }
    }

    // 生成纯图标网格 (无任何背景、边框)
    function buildIconGrid() {
        if (!gridContainer) return;
        gridContainer.innerHTML = '';

        sdgData.forEach(goal => {
            const iconWrapper = document.createElement('div');
            iconWrapper.className = 'sdg-icon';
            iconWrapper.setAttribute('data-id', goal.id);

            // 直接放图片，没有任何包裹层
            const img = document.createElement('img');
            img.src = goal.iconFile;
            img.alt = goal.title;

            // 可选：图片下方显示编号（如果不需要，删除或注释下面三行）
            const labelSpan = document.createElement('div');
            labelSpan.className = 'icon-label';
            labelSpan.innerText = `SDG ${goal.id}`;
            
            iconWrapper.appendChild(img);
            iconWrapper.appendChild(labelSpan);  // 不要编号就删除这行

            iconWrapper.addEventListener('click', (e) => {
                e.stopPropagation();
                const targetGoal = sdgData.find(g => g.id === goal.id);
                if (targetGoal) showPopupNearElement(iconWrapper, targetGoal);
            });

            gridContainer.appendChild(iconWrapper);
        });
    }

    // 点击页面其他区域关闭弹窗
    document.addEventListener('click', (e) => {
        if (!popup.classList.contains('active')) return;
        const isIconClick = e.target.closest('.sdg-icon') !== null;
        const isPopupClick = e.target.closest('.sdg-popup') !== null;
        if (!isIconClick && !isPopupClick) hidePopup();
    });

    window.addEventListener('resize', () => hidePopup());
    window.addEventListener('scroll', () => hidePopup(), { passive: true });

    if (closeBtn) {
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            hidePopup();
        });
    }

    buildIconGrid();
</script>
</body>
</html>
