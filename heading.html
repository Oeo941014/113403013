<!DOCTYPE html>
<html>
<head>
<title>Headings and Outlines</title>
<style>
  /* 設定所有的標題都使用預設的襯線字體，符合圖片樣式 */
  h1, h2, h3 {
    font-family: "Times New Roman", Times, serif;
  }

  /* Heading 1: 頂部邊框與文字陰影 */
  h1 {
    border-top: 3px solid black; /* 頂部黑色實線 */
    text-shadow: 3px 3px pink;   /* 粉紅色文字陰影 (水平偏移, 垂直偏移, 顏色) */
    padding-top: 5px;            /* 讓黑線跟文字稍微保持一點距離 */
  }

  /* Heading 2: 細邊框、黃色外框與斜體 */
  h2 {
    font-style: italic;          /* 設定斜體 */
    border: 1px solid black;     /* 內層的黑色細邊框 */
    outline: 3px solid yellow;   /* 題目特別強調的 outline，會在 border 外面再畫一圈 */
    padding: 5px;                /* 內邊距，讓文字不要貼在黑線上 */
    margin: 10px 0;              /* 外邊距，避免黃色外框被切到 */
  }

  /* Heading 3: 靠右對齊與底線 */
  h3 {
    text-align: right;           /* 靠右對齊 */
    text-decoration: underline;  /* 文字加上底線 */
  }
</style>
</head>
<body>

  <h1>This is heading 1</h1>
  <h2>This is heading 2</h2>
  <h3>This is heading 3</h3>

</body>
</html>
