<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>響應式佈局練習 - 2x2 修正版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #5ebfff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: white;
            width: 100%;
            max-width: 500px;
            padding: 10px;
            border-radius: 10px;
        }

        .header {
            background-color: #add633;
            height: 120px;
            margin: 10px;
            border-radius: 5px;
        }

        .main-content, .footer {
            display: flex;
            flex-wrap: wrap; /* 關鍵：允許換行 */
        }

        .box {
            margin: 10px;
            border-radius: 5px;
        }

        /* 藍色方塊 */
        .blue {
            background-color: #00bcd4;
            height: 100px;
            flex: 1;
            min-width: 100px;
        }

        /* 灰色方塊 */
        .grey {
            background-color: #f0f0f0;
            height: 50px;
            flex: 1;
            min-width: 40px;
        }

        /* --- 響應式調整 --- */
        @media (max-width: 480px) {
            /* 1. 藍色方塊：維持垂直三排 */
            .main-content {
                flex-direction: column;
            }
            .blue {
                width: calc(100% - 20px);
                flex: none;
            }

            /* 2. 灰色方塊：改為一排兩個 (2x2) */
            .footer {
                flex-direction: row; /* 確保它是橫向排列 */
                justify-content: space-between;
            }
            .grey {
                /* 每個佔 50%，減去左右 margin 的空間 */
                width: calc(50% - 20px); 
                flex: none; /* 關閉自動填滿，否則會跑掉 */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header"></header>

        <main class="main-content">
            <div class="box blue"></div>
            <div class="box blue"></div>
            <div class="box blue"></div>
        </main>

        <footer class="footer">
            <div class="box grey"></div>
            <div class="box grey"></div>
            <div class="box grey"></div>
            <div class="box grey"></div>
        </footer>
    </div>

</body>
</html>
