<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>響應式佈局練習</title>
    <style>
        /* CSS 樣式區域 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #5ebfff; /* 背景藍色 */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        .container {
            background-color: white;
            width: 100%;
            max-width: 500px; /* 限制最大寬度 */
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 頂部綠色區塊 */
        .header {
            background-color: #add633;
            height: 120px;
            margin: 10px;
            border-radius: 5px;
        }

        /* 中間與底部的容器 */
        .main-content, .footer {
            display: flex;
            flex-wrap: wrap; /* 允許換行 */
        }

        /* 方塊共通樣式 */
        .box {
            margin: 10px;
            border-radius: 5px;
        }

        /* 藍色方塊樣式 (預設橫排) */
        .blue {
            background-color: #00bcd4;
            height: 100px;
            flex: 1; /* 平分空間 */
            min-width: 100px; 
        }

        /* 灰色小方塊樣式 (預設橫排) */
        .grey {
            background-color: #f0f0f0;
            height: 50px;
            flex: 1;
            min-width: 40px;
        }

        /* --- 響應式關鍵：當寬度小於 480px 時 --- */
        @media (max-width: 480px) {
            .main-content, .footer {
                flex-direction: column; /* 改為垂直排列 */
            }

            .blue, .grey {
                width: calc(100% - 20px); /* 扣掉 margin 後佔滿寬度 */
                flex: none; /* 取消平分 */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header"></header>

        <main class="main-content">
            <div class="box blue"></div>
            <div class="box blue"></div>
            <div class="box blue"></div>
        </main>

        <footer class="footer">
            <div class="box grey"></div>
            <div class="box grey"></div>
            <div class="box grey"></div>
            <div class="box grey"></div>
        </footer>
    </div>

</body>
</html>
