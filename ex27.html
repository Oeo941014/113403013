<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>響應式佈局練習 - 修正高度與2x2</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #5ebfff;
            display: flex;
            justify-content: center;
            /* 💡 關鍵修正 1：防止容器被預設的 stretch 強制拉伸到 100vh 的高度 */
            align-items: flex-start; 
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: white;
            width: 100%;
            max-width: 500px;
            /* 💡 關鍵修正 2：確保容器高度自動貼合內部內容 */
            height: fit-content; 
            padding: 10px;
            border-radius: 10px;
        }

        .header {
            background-color: #add633;
            height: 120px;
            margin: 10px;
            border-radius: 5px;
        }

        .main-content, .footer {
            display: flex;
            flex-wrap: wrap; 
        }

        .box {
            margin: 10px;
            border-radius: 5px;
        }

        /* 藍色方塊 */
        .blue {
            background-color: #00bcd4;
            height: 100px;
            flex: 1;
            min-width: 100px;
        }

        /* 灰色方塊 */
        .grey {
            background-color: #f0f0f0;
            height: 50px;
            flex: 1;
            min-width: 40px;
        }

        /* --- 響應式調整 --- */
        @media (max-width: 480px) {
            .main-content {
                flex-direction: column;
            }
            .blue {
                width: calc(100% - 20px);
                flex: none;
            }

            .footer {
                flex-direction: row; 
                justify-content: space-between;
            }
            .grey {
                width: calc(50% - 20px); 
                flex: none; 
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header"></header>

        <main class="main-content">
            <div class="box blue"></div>
            <div class="box blue"></div>
            <div class="box blue"></div>
        </main>

        <footer class="footer">
            <div class="box grey"></div>
            <div class="box grey"></div>
            <div class="box grey"></div>
            <div class="box grey"></div>
        </footer>
    </div>

</body>
</html>
