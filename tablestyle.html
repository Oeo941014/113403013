<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Programming Exercise 20 (Fixed)</title>
    <style>
        /* 這裡開始是 CSS 樣式 */
        
        /* 讓整個 body 有點留白，看起來更舒服 (選填) */
        body {
            padding: 20px;
        }

        /* 表格基本設定 */
        table {
            border-collapse: collapse; /* 讓邊框合併成單一線條 */
            width: 300px;
            margin-top: 20px;
        }

        /* 單元格樣式 */
        th, td {
            border: 1px solid black;
            padding: 8px; /* 稍微縮小 padding */
            text-align: left;
            font-family: sans-serif; /* 使用比較無襯線的字體 */
        }

        /* 標題行：深灰色背景，白色文字 */
        .table-header {
            background-color: #7f7f7f;
            color: white;
        }

        /* 第 1 行與第 3 行：黃色背景 */
        .row-yellow {
            background-color: #ffff00;
        }

        /* 固定位置的 div 區塊 */
        .fixed-div {
            position: fixed;   /* 關鍵屬性：固定定位 */
            top: 40px;         /* 距離視窗頂部 40px，比範例稍低一點點 */
            right: 40px;       /* 距離視窗右側 40px */
            
            /* --- 這部分是調整框框大小和文字分行的關鍵 --- */
            width: 100px;      /* 縮小寬度，這會讓文字自然分行 */
            min-height: 100px; /* 設定最小高度 */
            
            border: 2px solid #8ebf42; /* 綠色邊框 */
            padding: 10px;     /* 內距 */
            background-color: white; /* 加上背景色才不會被後面的內容透過去 */
            font-family: serif; /* 綠框字體看起來是襯線體 */
            font-size: 16px;   /* 設定字體大小 */
            line-height: 1.2;  /* 設定行高，讓分行看起來更緊湊 */
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr class="table-header">
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
        </thead>
        <tbody>
            <tr class="row-yellow">
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
            </tr>
            <tr class="row-yellow">
                <td>3</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <div class="fixed-div">
        This div element has position: fixed;
    </div>

</body>
</html>
