<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CSS 圖片樣式練習</title>
    <style>
        body {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 50px;
            font-family: Arial, sans-serif;
        }

        /* 共同樣式：設定高度為 300px 並防止變形 */
        img {
            height: 300px;
            object-fit: cover; /* 關鍵：確保圖片不失真 */
        }

        /* 左側圖片：圓角 18px，寬度 33% */
        .image-left {
            width: 33%;
            border-radius: 18px;
        }

        /* 中間圖片：圓形，寬高皆為 150px，加上邊框 */
        .image-middle {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* 變成圓形 */
            border: 2px solid #333; /* 加上 border */
        }

        /* 右側圖片：有失真（Distortion） */
        .image-right {
            width: 33%;
            /* 為了呈現作業要求的 "distortion"，這裡故意不使用 object-fit */
            object-fit: fill; 
        }
    </style>
</head>
<body>
    <img src="https://th-thumbnailer.cdn-si-edu.com/pl7tMO37jADJMfZ8T1DuIRDaBbc=/fit-in/1600x0/https://tf-cmsv2-smithsonianmag-media.s3.amazonaws.com/filer/db/d6/dbd616d4-f52c-43cb-a9c2-4f77a5dcb2d3/eiffel-tower-night.jpg" alt="Eiffel Tower" class="image-left">

    <img src="https://img.freepik.com/free-photo/man-with-yellow-jacket-poses-top-rock_1304-5348.jpg?semt=ais_hybrid&w=740&q=80" alt="Landscape" class="image-middle">

    <img src="https://th-thumbnailer.cdn-si-edu.com/pl7tMO37jADJMfZ8T1DuIRDaBbc=/fit-in/1600x0/https://tf-cmsv2-smithsonianmag-media.s3.amazonaws.com/filer/db/d6/dbd616d4-f52c-43cb-a9c2-4f77a5dcb2d3/eiffel-tower-night.jpg" alt="Eiffel Tower" class="image-right">

</body>
</html>
