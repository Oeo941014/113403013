<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設計稿實作 - CNA 圖片版</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        /* 基礎樣式 */
        body { 
            margin: 0; 
            padding: 20px; 
            background-color: #f3f3f3; 
            font-family: 'Roboto', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
        }

        /* 模擬圖中的網頁容器 - 符合設計稿寬度 496px */
        .container { 
            background-color: #ffffff; 
            border: 1px solid #eaeaea; 
            width: 496px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease; /* 容器高度變化也加上動畫 */
        }
        
        /* 工具列 */
        .header { 
            background-color: #f6f6f6; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            justify-content: flex-end; /* 按鈕靠右 */
            border-bottom: 1px solid #eaeaea; 
        }
        
        /* 按鈕樣式 (根據標註 h22/R8) */
        .btn-info { 
            height: 22px; 
            border-radius: 8px; 
            background-color: #ffffff; 
            border: 1px solid #2f2f2f; 
            font-size: 13px; 
            color: #2f2f2f; 
            display: inline-flex; 
            align-items: center; 
            padding: 0 12px; 
            cursor: pointer; 
            outline: none; 
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-info:hover { 
            background-color: #f0f0f0; 
        }
        .btn-info.active { 
            background-color: #2f2f2f; 
            color: white; 
        } /* 點擊展開後的狀態 */

        /* 內容顯示區 */
        .content-area { 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            background-color: #fff;
        }

        /* --- 重點：照片樣式 --- */
        .preview-img {
            /* 預設狀態 (大圖) */
            width: 90%;          /* 寬度不佔滿，確保比框框小一點 */
            max-width: 450px;    /* 參考圖中預覽圖片寬度 */
            height: auto;
            max-height: 240px;   /* 參考圖中預覽圖片高度 */
            object-fit: contain; /* 改為 contain，完整顯示 CNA 圖片內容，不裁剪 */
            border: 1px solid #eee;
            margin-bottom: 10px;
            transition: all 0.3s ease; /* 圖片縮小動畫 */
            background-color: #fafafa; /* contain 模式下補白處的背景色 */
        }

        /* --- 資訊清單樣式 (參考圖中展開樣式) --- */
        #infoList {
            display: none;       /* 預設隱藏 */
            width: 100%;
            font-size: 12px;     /* 參考圖中 13px 微調為 12px 讓版面更緊湊 */
            color: #2f2f2f;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .info-item {
            background-color: #e8ffef; /* 淺綠色背景 */
            border-bottom: 1px solid #cfddff; /* 間隔線顏色 */
            padding: 6px 15px;   /* 增加上下間距讓字更好讀 */
            margin: 2px 0;
            display: flex;
            justify-content: flex-start;
        }

        .info-label { 
            width: 85px; 
            color: #707070;      /* 標籤顏色 */
        } 
        .info-value { 
            color: #0084ff;      /* 路徑或特定文字顏色 */
            word-break: break-all; /* 超長路徑強制斷行 */
        }

    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <button class="btn-info" id="toggleBtn">查看資訊</button>
        </header>
        
        <div class="content-area">
            <img 
                src="https://imgcdn.cna.com.tw/www/WebPhotos/800/20260111/2000x1267_wmky_855732567388_202509170217000000.jpg" 
                alt="CNA中央社圖片預覽" 
                class="preview-img" 
                id="mainImg"
            >
            
            <div id="infoList">
                <div class="info-item"><span class="info-label">修改日期：</span><span>2026/04/22 10:16</span></div>
                <div class="info-item"><span class="info-label">類別：</span><span>JPEG</span></div>
                <div class="info-item"><span class="info-label">大小：</span><span>1.2 MB (2000x1267)</span></div>
                <div class="info-item">
                    <span class="info-label">路徑：</span>
                    <span class="info-value">https://imgcdn.cna.com.tw/www/WebPhotos/800/20260111/2000x1267_wmky_855732567388_202509170217000000.jpg</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const info = document.getElementById('infoList');
        const container = document.getElementById('scrollContainer');

        btn.addEventListener('click', function() {
            if (info.style.display === 'none' || info.style.display === '') {
                info.style.display = 'block';
                btn.textContent = '收起資訊';
                btn.classList.add('active');
                
                // 自動稍微向下捲動，讓使用者看到資訊出現了
                setTimeout(() => {
                    container.scrollTo({
                        top: 150, 
                        behavior: 'smooth'
                    });
                }, 100);
            } else {
                info.style.display = 'none';
                btn.textContent = '查看資訊';
                btn.classList.remove('active');
                // 收起時回到頂部
                container.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    </script>

</body>
</html>
