<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設計稿實作 - 捲軸下滑版</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        /* 基礎設定 */
        body { 
            margin: 0; 
            padding: 20px; 
            background-color: #f3f3f3; 
            font-family: 'Roboto', sans-serif; 
            display: flex; 
            justify-content: center; 
        }

        /* --- 容器設定：加入固定高度與捲軸 --- */
        .container { 
            background-color: #ffffff; 
            border: 1px solid #eaeaea; 
            width: 496px; 
            height: 380px;      /* 設定固定高度，讓內容超過時可以捲動 */
            overflow-y: auto;    /* 關鍵：垂直方向自動顯示捲軸 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
        }

        /* 自定義捲軸樣式 (Chrome/Edge/Safari) */
        .container::-webkit-scrollbar { width: 6px; }
        .container::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        /* 工具列：改為固定在頂部，不隨內容捲動 */
        .header { 
            background-color: #f6f6f6; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            padding: 0 15px; 
            justify-content: flex-end; 
            border-bottom: 1px solid #eaeaea;
            position: sticky; /* 固定在頂部 */
            top: 0;
            z-index: 10;
        }
        
        /* 按鈕樣式 */
        .btn-info { 
            height: 22px; border-radius: 8px; background-color: #ffffff; 
            border: 1px solid #2f2f2f; font-size: 13px; color: #2f2f2f; 
            display: inline-flex; align-items: center; padding: 0 12px; 
            cursor: pointer; transition: 0.2s;
        }
        .btn-info.active { background-color: #2f2f2f; color: white; }

        /* 內容顯示區 */
        .content-area { 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }

        /* 照片樣式：維持固定尺寸不變 */
        .preview-img {
            width: 450px;       /* 鎖定寬度 */
            height: 240px;      /* 鎖定高度 */
            object-fit: cover; 
            border: 1px solid #eee;
            margin-bottom: 15px;
            flex-shrink: 0;     /* 防止圖片被擠壓 */
        }

        /* 資訊清單樣式 */
        #infoList {
            display: none;      /* 預設隱藏 */
            width: 100%;
            font-size: 12px;
            color: #2f2f2f;
            margin-top: 5px;
        }

        .info-item {
            background-color: #e8ffef; 
            border-bottom: 1px solid #cfddff; 
            padding: 8px 15px;
            margin: 2px 0;
            display: flex;
        }

        .info-label { width: 85px; color: #707070; } 
        .info-value { color: #0084ff; word-break: break-all; }

    </style>
</head>
<body>

    <div class="container" id="scrollContainer">
        <header class="header">
            <button class="btn-info" id="toggleBtn">查看資訊</button>
        </header>
        
        <div class="content-area">
            <img 
                src="https://imgcdn.cna.com.tw/www/WebPhotos/800/20260111/2000x1267_wmky_855732567388_202509170217000000.jpg" 
                alt="CNA圖片" 
                class="preview-img"
            >
            
            <div id="infoList">
                <div class="info-item"><span class="info-label">修改日期：</span><span>2026/04/22 10:16</span></div>
                <div class="info-item"><span class="info-label">類別：</span><span>JPEG</span></div>
                <div class="info-item"><span class="info-label">大小：</span><span>1.2 MB</span></div>
                <div class="info-item">
                    <span class="info-label">路徑：</span>
                    <span class="info-value">https://imgcdn.cna.com.tw/www/WebPhotos/800/20260111/2000x1267_wmky_855732567388_202509170217000000.jpg</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const info = document.getElementById('infoList');
        const container = document.getElementById('scrollContainer');

        btn.addEventListener('click', function() {
            if (info.style.display === 'none' || info.style.display === '') {
                info.style.display = 'block';
                btn.textContent = '收起資訊';
                btn.classList.add('active');
                
                // 自動稍微向下捲動，讓使用者看到資訊出現了
                setTimeout(() => {
                    container.scrollTo({
                        top: 150, 
                        behavior: 'smooth'
                    });
                }, 100);
            } else {
                info.style.display = 'none';
                btn.textContent = '查看資訊';
                btn.classList.remove('active');
                // 收起時回到頂部
                container.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    </script>

</body>
</html>
