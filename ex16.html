<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        /* General styling for the text boxes */
        .box {
            font-family: "Times New Roman", Times, serif;
            font-size: 28px;
            font-weight: bold;
            padding: 10px 15px;
            margin-bottom: 15px;
            width: fit-content; /* Keeps the box width tight to the text like the image */
            min-width: 350px;
        }

        /* 1. Light blue background with a red double border */
        .box-1 {
            background-color: #ADD8E6; /* Light Blue */
            border: 6px double #E74C3C; /* Red/Tomato Double Border */
        }

        /* 2. Yellow background with a blue solid border and rounded corners */
        .box-2 {
            background-color: #FFFF00; /* Yellow */
            border: 2px solid #0000FF; /* Blue Solid Border */
            border-radius: 12px;       /* Rounded Corners */
        }

        /* 3. Green background with a grey dotted border */
        .box-3 {
            background-color: #3CB371; /* Medium Sea Green */
            border: 8px dotted #808080; /* Grey Dotted Border */
        }
    </style>
</head>
<body>

    <div class="box box-1">Hello World</div>
    <div class="box box-2">Hello World</div>
    <div class="box box-3">Hello World</div>

</body>
</html>
